name: ci

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Frontend lint
        run: npm run lint
        continue-on-error: true

      - name: Frontend unit tests
        run: npm run test

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend build
        run: npm run build

      - name: Backend build
        run: npm run backend:build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Critical E2E regression
        run: npm run e2e:critical

      - name: Route smoke E2E
        run: npm run e2e:smoke

      - name: Action/state matrix E2E
        run: npm run e2e:matrix

      - name: Real integration E2E
        run: npm run e2e:real

      - name: Observability snapshot
        run: npm run runtime:observability
